<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Simple Calculator</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f4f7fb;
      --surface: #ffffff;
      --surface-strong: #eef2f9;
      --text: #1f2937;
      --text-muted: #6b7280;
      --accent: #4f46e5;
      --accent-soft: rgba(79, 70, 229, 0.12);
      --border: rgba(31, 41, 55, 0.08);
      --shadow: 0 24px 60px rgba(15, 23, 42, 0.08);
      --shadow-soft: 0 8px 24px rgba(15, 23, 42, 0.08);
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    html, body {
      margin: 0;
      min-height: 100%;
      background: radial-gradient(circle at top, rgba(79, 70, 229, 0.14), transparent 34%),
        linear-gradient(180deg, #eef2ff 0%, #f8fafc 45%, #f4f7fb 100%);
      color: var(--text);
    }

    body {
      display: grid;
      place-items: center;
      padding: 24px;
    }

    .calculator {
      width: min(420px, 100%);
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 32px;
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .top-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      padding: 24px 24px 16px;
    }

    .title-group {
      display: grid;
      gap: 6px;
    }

    .title {
      margin: 0;
      font-size: 1.1rem;
      font-weight: 700;
      letter-spacing: -0.02em;
    }

    .subtitle {
      margin: 0;
      color: var(--text-muted);
      font-size: 0.9rem;
    }

    .toggle-switch {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      font-size: 0.95rem;
    }

    .toggle-switch input {
      position: absolute;
      opacity: 0;
      width: 0;
      height: 0;
    }

    .slider {
      position: relative;
      width: 46px;
      height: 26px;
      border-radius: 999px;
      background: #d1d5db;
      transition: background 0.25s ease;
      cursor: pointer;
    }

    .slider::after {
      content: "";
      position: absolute;
      top: 3px;
      left: 3px;
      width: 20px;
      height: 20px;
      border-radius: 50%;
      background: #ffffff;
      box-shadow: 0 8px 16px rgba(15, 23, 42, 0.08);
      transition: transform 0.25s ease;
    }

    input:checked + .slider {
      background: var(--accent);
    }

    input:checked + .slider::after {
      transform: translateX(20px);
    }

    .display {
      display: grid;
      gap: 12px;
      padding: 0 24px 24px;
      background: linear-gradient(180deg, #ffffff 0%, #f8fafc 100%);
    }

    .display-screen {
      min-height: 110px;
      border-radius: 24px;
      padding: 22px 22px 16px;
      background: var(--surface-strong);
      border: 1px solid rgba(31, 41, 55, 0.08);
      display: grid;
      align-content: end;
      text-align: right;
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.8);
    }

    .display-expression {
      margin: 0;
      color: var(--text-muted);
      font-size: 0.95rem;
      word-wrap: break-word;
      min-height: 1.2em;
    }

    .display-result {
      margin: 0;
      color: var(--text);
      font-size: clamp(1.8rem, 4vw, 2.9rem);
      font-weight: 700;
      word-break: break-word;
    }

    .buttons {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 14px;
      padding: 0 24px 24px;
    }

    .button {
      border: none;
      border-radius: 18px;
      padding: 20px 0;
      font-size: 1.2rem;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.14s ease, box-shadow 0.2s ease, background-color 0.2s ease, color 0.2s ease;
      box-shadow: 0 12px 24px rgba(15, 23, 42, 0.08);
      background: var(--surface-strong);
      color: var(--text);
      user-select: none;
    }

    .button:hover {
      transform: translateY(-1px);
      box-shadow: 0 14px 28px rgba(15, 23, 42, 0.12);
    }

    .button:active {
      transform: translateY(0);
      box-shadow: 0 6px 12px rgba(15, 23, 42, 0.12);
    }

    .button.operator {
      background: #eef2ff;
      color: #4338ca;
    }

    .button.clear {
      background: #fee2e2;
      color: #991b1b;
    }

    .button.equals {
      background: var(--accent);
      color: #ffffff;
      grid-column: span 2;
    }

    .button.zero {
      grid-column: span 2;
    }

    .button.wide {
      grid-column: span 4;
    }

    @media (max-width: 500px) {
      .calculator {
        border-radius: 26px;
      }
      .top-bar {
        padding: 22px 20px 14px;
      }
      .display {
        padding: 0 20px 20px;
      }
      .buttons {
        gap: 12px;
        padding: 0 20px 20px;
      }
      .button {
        padding: 18px 0;
        font-size: 1.1rem;
      }
    }

    .dark {
      color-scheme: dark;
      --bg: #080b14;
      --surface: #0f172a;
      --surface-strong: #111827;
      --text: #f8fafc;
      --text-muted: #94a3b8;
      --accent: #8b5cf6;
      --accent-soft: rgba(139, 92, 246, 0.16);
      --border: rgba(148, 163, 184, 0.14);
      background: radial-gradient(circle at top, rgba(139, 92, 246, 0.16), transparent 34%),
        linear-gradient(180deg, #111827 0%, #0f172a 45%, #0b1221 100%);
    }

    .dark .calculator {
      background: #0f172a;
      border-color: rgba(148, 163, 184, 0.14);
      box-shadow: 0 24px 60px rgba(15, 23, 42, 0.4);
    }

    .dark .display-screen {
      background: #111827;
      border-color: rgba(148, 163, 184, 0.14);
    }

    .dark .button {
      background: #111827;
      color: #f8fafc;
      box-shadow: 0 12px 24px rgba(15, 23, 42, 0.35);
    }

    .dark .button:hover {
      box-shadow: 0 14px 28px rgba(15, 23, 42, 0.4);
    }

    .dark .button.operator {
      background: #1e293b;
      color: #c7d2fe;
    }

    .dark .button.clear {
      background: #7f1d1d;
      color: #fee2e2;
    }

    .dark .button.equals {
      background: #8b5cf6;
      color: #ffffff;
    }

    .dark .display-expression {
      color: #94a3b8;
    }
  </style>
</head>
<body>
  <main class="calculator" id="calculator">
    <section class="top-bar">
      <div class="title-group">
        <h1 class="title">Premium Calculator</h1>
        <p class="subtitle">Clean layout • Smooth controls • Dark mode</p>
      </div>
      <label class="toggle-switch">
        <span>Dark</span>
        <input type="checkbox" id="darkModeToggle" aria-label="Toggle dark mode" />
        <span class="slider"></span>
      </label>
    </section>

    <section class="display">
      <div class="display-screen" aria-live="polite">
        <p class="display-expression" id="expression">0</p>
        <p class="display-result" id="result">0</p>
      </div>
    </section>

    <section class="buttons" role="group" aria-label="Calculator buttons">
      <button class="button clear" data-action="clear">C</button>
      <button class="button operator" data-value="/">÷</button>
      <button class="button operator" data-value="*">×</button>
      <button class="button operator" data-value="-">−</button>

      <button class="button" data-value="7">7</button>
      <button class="button" data-value="8">8</button>
      <button class="button" data-value="9">9</button>
      <button class="button operator" data-value="+">+</button>

      <button class="button" data-value="4">4</button>
      <button class="button" data-value="5">5</button>
      <button class="button" data-value="6">6</button>
      <button class="button" data-value=".">.</button>

      <button class="button" data-value="1">1</button>
      <button class="button" data-value="2">2</button>
      <button class="button" data-value="3">3</button>
      <button class="button equals" data-action="equals">=</button>

      <button class="button zero" data-value="0">0</button>
    </section>
  </main>

  <script>
    const calculator = document.getElementById('calculator');
    const expressionElement = document.getElementById('expression');
    const resultElement = document.getElementById('result');
    const darkModeToggle = document.getElementById('darkModeToggle');

    let expression = '';

    const operators = ['', '-', '*', '/'];

    function updateDisplay() {
      expressionElement.textContent = expression || '0';
      resultElement.textContent = expression ? evaluateExpression(expression) : '0';
    }

    function evaluateExpression(value) {
      if (!value) return '0';
      try {
        const sanitized = value.replace(/×/g, '*').replace(/÷/g, '/');
        const result = Function(`return ${sanitized}`)();
        return Number.isFinite(result) ? result.toString() : 'Error';
      } catch {
        return 'Error';
      }
    }

    function appendValue(value) {
      const lastChar = expression.slice(-1);

      if (value === '.' && lastChar === '.') return;

      if (operators.includes(value)) {
        if (!expression) return; // don't start with operator
        if (operators.includes(lastChar)) {
          expression = expression.slice(0, -1) + value; // replace repeated operator
          updateDisplay();
          return;
        }
      }

      if (value === '.' && !expression) {
        expression = '0.';
        updateDisplay();
        return;
      }

      expression += value;
      updateDisplay();
    }

    function clearExpression() {
      expression = '';
      updateDisplay();
    }

    function calculateResult() {
      if (!expression) return;
      if (operators.includes(expression.slice(-1))) {
        expression = expression.slice(0, -1);
      }

      const result = evaluateExpression(expression);
      expression = result === 'Error' ? '' : result;
      updateDisplay();
    }

    calculator.addEventListener('click', event => {
      const button = event.target.closest('button');
      if (!button) return;

      const value = button.dataset.value;
      const action = button.dataset.action;

      if (action === 'clear') {
        clearExpression();
        return;
      }

      if (action === 'equals') {
        calculateResult();
        return;
      }

      if (value) {
        appendValue(value);
      }
    });

    window.addEventListener('keydown', event => {
      const key = event.key;
      if (key === 'Enter' || key === '=') {
        event.preventDefault();
        calculateResult();
        return;
      }

      if (key === 'Backspace') {
        event.preventDefault();
        expression = expression.slice(0, -1);
        updateDisplay();
        return;
      }

      if (key === 'Escape') {
        event.preventDefault();
        clearExpression();
        return;
      }

      if (/^[0-9]$/.test(key) || operators.includes(key) || key === '.') {
        event.preventDefault();
        appendValue(key);
      }
    });

    darkModeToggle.addEventListener('change', () => {
      document.body.classList.toggle('dark', darkModeToggle.checked);
    });

    updateDisplay();
  </script>
</body>
</html>
